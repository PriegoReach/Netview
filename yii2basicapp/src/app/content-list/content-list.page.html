<ion-header>
  <ion-toolbar color="netview">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Contenidos</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cargarDatos()">
        <ion-icon name="refresh" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button routerLink="/content-create">
        <ion-icon name="add" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-searchbar
    [debounce]="800"
    (ionInput)="handleInput($event)"
    placeholder="Buscar contenido..."
  ></ion-searchbar>

  <!-- Estado vacío -->
  <div class="empty-state" *ngIf="items.length === 0">
    <ion-icon name="film-outline" class="empty-icon"></ion-icon>
    <p class="empty-texto" *ngIf="busqueda === ''">No hay contenidos registrados.</p>
    <p class="empty-texto" *ngIf="busqueda !== ''">Sin resultados para "{{ busqueda }}".</p>
  </div>

  <!-- Listado -->
  <ion-list *ngIf="items.length > 0">
    <ion-item *ngFor="let item of items">

      <ion-label class="ion-text-wrap">
        <h3>{{ item.title }}</h3>
        <p class="meta-fila">
          <span class="nv-badge" [ngClass]="tipoBadgeClass(item.content_type)">
            {{ item.content_type }}
          </span>
          ID {{ item.content_id }} · {{ item.duration_minutes }} min
        </p>
      </ion-label>

      <!-- Botón Ver -->
      <ion-button
        [routerLink]="['/content-detail', item.content_id]"
        fill="clear"
        slot="end"
      >
        <ion-icon name="eye" slot="icon-only" color="primary"></ion-icon>
      </ion-button>

      <!-- Botón Editar -->
      <ion-button
        routerLink="/content-edit"
        [queryParams]="{ id: item.content_id }"
        fill="clear"
        slot="end"
      >
        <ion-icon name="pencil" slot="icon-only" color="warning"></ion-icon>
      </ion-button>

      <!-- Botón Eliminar (módulo 5) -->
      <ion-button
        (click)="alertEliminar(item.content_id, item.title)"
        fill="clear"
        slot="end"
      >
        <ion-icon name="trash" slot="icon-only" color="danger"></ion-icon>
      </ion-button>

    </ion-item>
  </ion-list>

  <app-paginacion
    [total]="total"
    [porPagina]="porPagina"
    (click)="pagina($event)"
  ></app-paginacion>

</ion-content>
