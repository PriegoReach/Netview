<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="cerrar()">
        <ion-icon name="close"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Editar Watch History</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-item>
    <ion-label position="floating">Profile ID</ion-label>
    <ion-input type="number" [(ngModel)]="profile_id"></ion-input>
  </ion-item>
  <ion-item>
    <ion-label position="floating">Content ID</ion-label>
    <ion-input type="number" [(ngModel)]="content_id"></ion-input>
  </ion-item>
  <ion-item>
    <ion-label position="floating">Episode ID</ion-label>
    <ion-input type="number" [(ngModel)]="episode_id"></ion-input>
  </ion-item>
  <ion-item>
    <ion-label position="floating">Segundos vistos</ion-label>
    <ion-input type="number" [(ngModel)]="watched_seconds"></ion-input>
  </ion-item>
  <ion-button expand="full" (click)="guardar()">Guardar</ion-button>
</ion-content>
