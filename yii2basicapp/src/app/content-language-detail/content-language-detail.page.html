<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/content-language-list"></ion-back-button>
    </ion-buttons>
    <ion-title>Detalle</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card *ngIf="item">
    <ion-card-header>
      <ion-card-title>{{item.content_id}}</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-list>
        <ion-item>
          <ion-label>
            <p>Content ID</p>
            <h2>{{item.content_id}}</h2>
          </ion-label>
        </ion-item>
        <ion-item>
          <ion-label>
            <p>Language ID</p>
            <h2>{{item.language_id}}</h2>
          </ion-label>
        </ion-item>
        <ion-item>
          <ion-label>
            <p>Tipo de idioma</p>
            <h2>{{item.language_type}}</h2>
          </ion-label>
        </ion-item>
      </ion-list>
      <ion-button (click)="alertEliminar(item.content_id, item.language_id, item.language_type)" color="danger" expand="full">
    <ion-icon name="trash"></ion-icon> Eliminar
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
