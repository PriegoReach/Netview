<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/content-list"></ion-back-button>
    </ion-buttons>
    <ion-title>Detalle</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card *ngIf="item">
    <ion-card-header>
      <ion-card-title>{{item.title}}</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-list>
        <ion-item>
          <ion-label>
            <p>ID</p>
            <h2>{{item.content_id}}</h2>
          </ion-label>
        </ion-item>
        <ion-item>
          <ion-label>
            <p>Título</p>
            <h2>{{item.title}}</h2>
          </ion-label>
        </ion-item>
        <ion-item>
          <ion-label>
            <p>Descripción</p>
            <h2>{{item.description}}</h2>
          </ion-label>
        </ion-item>
        <ion-item>
          <ion-label>
            <p>Duración (minutos)</p>
            <h2>{{item.duration_minutes}}</h2>
          </ion-label>
        </ion-item>
        <ion-item>
          <ion-label>
            <p>Tipo</p>
            <span class="nv-badge" [ngClass]="tipoBadgeClass(item.content_type)">
              {{ item.content_type }}
            </span>
          </ion-label>
        </ion-item>
      </ion-list>
      <ion-button (click)="editar(item.content_id)" color="warning" expand="full">
        <ion-icon name="pencil"></ion-icon> Editar
      </ion-button>
      <ion-button (click)="alertEliminar(item.content_id)" color="danger" expand="full">
        <ion-icon name="trash"></ion-icon> Eliminar
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
