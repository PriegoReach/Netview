<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/favorite-list"></ion-back-button>
    </ion-buttons>
    <ion-title>Detalle</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card *ngIf="item">
    <ion-card-header>
      <ion-card-title>{{item.profile_id}}</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-list>
        <ion-item>
          <ion-label>
            <p>Profile ID</p>
            <h2>{{item.profile_id}}</h2>
          </ion-label>
        </ion-item>
        <ion-item>
          <ion-label>
            <p>Content ID</p>
            <h2>{{item.content_id}}</h2>
          </ion-label>
        </ion-item>
      </ion-list>
      <ion-button (click)="editar(item.profile_id)" color="warning" expand="full">
        <ion-icon name="pencil"></ion-icon> Editar
      </ion-button>
      <ion-button (click)="alertEliminar(item.profile_id, item.content_id)" color="danger" expand="full">
    <ion-icon name="trash"></ion-icon> Eliminar
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
