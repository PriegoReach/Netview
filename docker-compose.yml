# ============================================================
# Archivo: docker-compose.yml (raíz del proyecto)
#
# Orquesta:
#   - php       : Backend Yii2 (puerto 80)
#   - db        : MariaDB (puerto 3308)
#   - phpmyadmin: Admin DB (puerto 8080)
#   - frontend  : Ionic + Nginx (puerto 8100) 
# ============================================================

services:

  php:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: netview_php
    ports:
      - "80:80"
    volumes:
      - ./yii2basic:/var/www/html
    depends_on:
      - db
    environment:
      - YII_ENV=prod
    networks:
      - netview_network

  db:
    image: mariadb:10.6
    container_name: netview_db
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: netview
      MYSQL_USER: yii2
      MYSQL_PASSWORD: yii2password
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - netview_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: netview_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
    networks:
      - netview_network

  frontend:
    build:
      context: ./yii2basicapp
      dockerfile: Dockerfile
    container_name: netview_frontend
    ports:
      - "8100:80"
    depends_on:
      - php
    networks:
      - netview_network
    restart: unless-stopped

networks:
  netview_network:
    driver: bridge

volumes:
  db_data: