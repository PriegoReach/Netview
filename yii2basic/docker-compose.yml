version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: cine_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: Cine&Refresco
      MYSQL_USER: yii2
      MYSQL_PASSWORD: yii2password
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cine_network

  php:
    image: yiisoftware/yii2-php:7.4-apache
    container_name: cine_backend
    restart: always
    volumes:
      - ~/.composer-docker/cache:/root/.composer/cache:delegated
      - ./:/app:delegated
    ports:
      - '8080:80'
    depends_on:
      - db
    networks:
      - cine_network

  ionic:
    build:
      context: ../yii2basicapp
      dockerfile: Dockerfile
    container_name: cine_frontdoend
    restart: always
    ports:
      - '8100:80'
    depends_on:
      - php
    networks:
      - cine_network

volumes:
  db_data:

networks:
  cine_network:
    driver: bridge