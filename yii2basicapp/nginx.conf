# ============================================================
# Archivo: yii2basicapp/nginx.conf
# 
# Configuración Nginx para servir SPA Angular/Ionic.
# Maneja el routing del lado cliente (todas las rutas → index.html).
# ============================================================

server {
    listen 80;
    server_name _;

    # Angular 17+ outputtea a www/browser/ por defecto
    # Si tu build queda en www/ raíz, cambia esta línea a:
    # root /usr/share/nginx/html;
    root /usr/share/nginx/html;
    index index.html;

    # Comprimir respuestas para mejor performance
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml+rss image/svg+xml;
    gzip_vary on;
    gzip_min_length 256;

    # Routing SPA: cualquier ruta no encontrada → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache largo para assets estáticos
    location ~* \.(?:css|js|woff2?|eot|ttf|otf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # No cachear index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Headers de seguridad básicos
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
