<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/genre-list"></ion-back-button>
    </ion-buttons>
    <ion-title>Detalle</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card *ngIf="item">
    <ion-card-header>
      <ion-card-title>{{item.genre_name}}</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-list>
        <ion-item>
          <ion-label>
            <p>ID</p>
            <h2>{{item.genre_id}}</h2>
          </ion-label>
        </ion-item>
        <ion-item>
          <ion-label>
            <p>Nombre</p>
            <h2>{{item.genre_name}}</h2>
          </ion-label>
        </ion-item>
      </ion-list>
      <ion-button (click)="editar(item.genre_id)" color="warning" expand="full">
        <ion-icon name="pencil"></ion-icon> Editar
      </ion-button>
      <ion-button (click)="alertEliminar(item.genre_id)" color="danger" expand="full">
        <ion-icon name="trash"></ion-icon> Eliminar
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
