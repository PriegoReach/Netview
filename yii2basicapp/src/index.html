<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Netview</title>

  <base href="/" />

  <meta name="color-scheme" content="light dark" />
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />

  <!-- Favicons NETVIEW -->
  <link rel="icon" type="image/x-icon" href="assets/icon/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icon/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icon/favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />

  <!-- Meta tags para SEO y compartir en redes -->
  <meta name="description" content="Netview - Tu plataforma de streaming favorita" />
  <meta name="theme-color" content="#e24b4a" />

  <!-- Open Graph (para compartir en WhatsApp, Facebook, etc.) -->
  <meta property="og:title" content="Netview" />
  <meta property="og:description" content="Tu plataforma de streaming favorita" />
  <meta property="og:image" content="assets/logo-completo.png" />
  <meta property="og:type" content="website" />

  <!-- add to homescreen for ios -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Netview" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
</head>

<body>
  <app-root></app-root>
</body>
</html>
