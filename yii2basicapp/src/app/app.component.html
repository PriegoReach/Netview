<ion-app>
  <!-- Menú lateral SOLO para administradores -->
  <ion-menu contentId="main" *ngIf="auth.esAdmin()">
    <ion-header>
      <ion-toolbar color="netview">
        <ion-buttons slot="start">
          <img src="assets/logo-icono.png" alt="Netview" class="menu-logo" />
        </ion-buttons>
        <ion-title>Administración</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content [fullscreen]="true">

      <!-- ── NAVEGACIÓN GENERAL ── -->
      <ion-list>
        <ion-list-header>
          <ion-label class="header-label">NAVEGACIÓN</ion-label>
        </ion-list-header>

        <ion-menu-toggle auto-hide="true">
          <ion-item
            routerLink="/tabs/tab1"
            routerDirection="root"
            button
            detail="true"
          >
            <ion-icon name="home" slot="start" class="item-icon"></ion-icon>
            <ion-label>Volver a la app</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>

      <!-- ── CRUDs ADMIN · agrupados por sección ── -->
      <ion-list *ngFor="let seccion of secciones">
        <ion-list-header>
          <ion-label class="header-label">{{ seccion.titulo }}</ion-label>
        </ion-list-header>

        <ion-menu-toggle
          auto-hide="true"
          *ngFor="let enlace of seccion.enlaces"
        >
          <ion-item
            [routerLink]="enlace.ruta"
            routerDirection="root"
            button
            detail="true"
          >
            <ion-label>{{ enlace.texto }}</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>

      <!-- ── CERRAR SESIÓN ── -->
      <ion-list>
        <ion-menu-toggle auto-hide="true">
          <ion-item button (click)="cerrarSesion()" class="item-logout">
            <ion-icon name="log-out-outline" slot="start" class="item-icon-logout"></ion-icon>
            <ion-label color="danger">Cerrar sesión</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>

  <!-- Contenido principal -->
  <ion-router-outlet id="main"></ion-router-outlet>
</ion-app>
