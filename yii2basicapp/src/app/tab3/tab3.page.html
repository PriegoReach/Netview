<ion-header>
  <ion-toolbar color="netview">
    <ion-title>Mi Perfil</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cerrarSesion()">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <!-- ── CABECERA DEL USUARIO ── -->
  <div class="perfil-header" *ngIf="usuario">
    <div class="avatar">
      <img [src]="usuario.avatar" [alt]="usuario.nombre" />
    </div>
    <div class="perfil-nombre-row">
      <p class="perfil-nombre">{{ usuario.nombre }}</p>
      <!-- Simbología de rol: insignia Admin (rojo) o Cliente (negro) -->
      <span
        class="nv-badge"
        [ngClass]="auth.esAdmin() ? 'nv-badge--admin' : 'nv-badge--cliente'"
      >
        {{ auth.esAdmin() ? 'Admin' : 'Cliente' }}
      </span>
    </div>
    <p class="perfil-email">{{ usuario.email }}</p>
  </div>

  <!-- ── SECCIÓN: MI CUENTA ── -->
  <div class="seccion">
    <p class="seccion-titulo">MI CUENTA</p>

    <ion-list lines="none" class="lista-opciones">
      <ion-item button detail="true" (click)="editarPerfil()">
        <ion-icon name="person-outline" slot="start" class="item-icon"></ion-icon>
        <ion-label>Editar Perfil</ion-label>
      </ion-item>
      <ion-item button detail="true" (click)="abrirAjustes()">
        <ion-icon name="settings-outline" slot="start" class="item-icon"></ion-icon>
        <ion-label>Ajustes</ion-label>
      </ion-item>
    </ion-list>
  </div>

  <!-- ── SECCIÓN: SUSCRIPCIÓN ── -->
  <ng-container *ngIf="usuario?.suscripcion as suscripcion">
    <div class="seccion">
      <p class="seccion-titulo">SUSCRIPCIÓN</p>

      <div class="card-suscripcion">
        <div class="plan-row">
          <span class="plan-nombre">Plan {{ suscripcion.plan }}</span>
          <span class="plan-badge" *ngIf="suscripcion.activo">Activo</span>
        </div>
        <p class="plan-renovacion">
          Renueva el: {{ suscripcion.renovacion | date:'dd/MM/yyyy' }}
        </p>
        <ion-button
          expand="block"
          fill="outline"
          color="medium"
          class="btn-cambiar-plan"
          (click)="cambiarPlan()"
        >
          Cambiar Plan
        </ion-button>
      </div>
    </div>
  </ng-container>

  <!-- ── SECCIÓN: CONTINUAR VIENDO ── -->
  <div class="seccion" *ngIf="continuarViendo.length > 0">
    <p class="seccion-titulo">CONTINUAR VIENDO</p>

    <div class="grid-continuar">
      <div
        class="continuar-card"
        *ngFor="let item of continuarViendo"
        (click)="reanudar(item.id)"
      >
        <div class="continuar-thumb">
          <img [src]="item.imagen" [alt]="item.titulo" />
          <div class="continuar-overlay">
            <ion-icon name="play-circle-outline"></ion-icon>
          </div>
          <!-- Barra de progreso -->
          <div class="progress-bar">
            <div class="progress-fill" [style.width.%]="item.progreso"></div>
          </div>
        </div>
        <p class="continuar-titulo">{{ item.titulo }}</p>
      </div>
    </div>
  </div>

  <!-- Espaciado inferior -->
  <div style="height: 20px;"></div>

</ion-content>
