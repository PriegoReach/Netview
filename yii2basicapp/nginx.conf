# ============================================================
# Archivo: yii2basicapp/nginx.conf
#
# Configuración Nginx para servir SPA Angular/Ionic.
# Maneja el routing del lado cliente (todas las rutas → index.html).
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Comprimir respuestas para mejor performance
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml+rss image/svg+xml;
    gzip_vary on;
    gzip_min_length 256;

    # Assets estáticos (nombre con hash o carpeta assets): cache largo.
    # Incluye mp4 para que el video no se descargue en cada visita.
    location ~* \.(?:css|js|woff2?|eot|ttf|otf|svg|png|jpg|jpeg|gif|webp|ico|mp4)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Routing SPA: cualquier ruta → index.html.
    # index.html NUNCA se cachea, así el navegador siempre carga la
    # versión nueva tras cada despliegue (sin esto, queda app vieja).
    # Las cabeceras de seguridad se repiten aquí porque un bloque con
    # add_header propio no hereda los del nivel server.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
}
